<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude — mock</title>
<style>
  :root {
    --bg: #0d0d0c;
    --card: #1a1918;
    --card-border: #292825;
    --border-faint: #262523;
    --ink: #e9e6e0;
    --ink-muted: #96938c;
    --ink-faint: #6f6c66;
    --pill-active-bg: #2f2e2b;
    --accent: #d97757;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .titlebar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 18px;
    padding: 0 18px;
    -webkit-app-region: drag;
  }

  .ghost {
    width: 16px;
    height: 16px;
    opacity: 0.55;
  }

  .win-btn {
    width: 13px;
    height: 13px;
    opacity: 0.45;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .win-btn svg { width: 100%; height: 100%; }

  .stage {
    height: calc(100% - 44px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
  }

  .center {
    width: 100%;
    max-width: 620px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .greeting {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 34px;
  }

  .spark {
    width: 30px;
    height: 30px;
    flex-shrink: 0;
  }

  .greeting h1 {
    font-family: 'Iowan Old Style', 'Palatino Linotype', Georgia, 'Times New Roman', serif;
    font-weight: 400;
    font-size: 34px;
    letter-spacing: -0.01em;
    color: #f2efe9;
  }

  .card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 18px 20px 14px;
  }

  .placeholder {
    color: var(--ink-faint);
    font-size: 15.5px;
    padding: 4px 2px 20px;
  }

  .card-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .row-left, .row-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .icon-btn {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-muted);
    cursor: default;
  }
  .icon-btn svg { width: 16px; height: 16px; }

  .segmented {
    display: flex;
    align-items: center;
    background: transparent;
    border-radius: 100px;
    padding: 3px;
    gap: 2px;
  }

  .segmented button {
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 13.5px;
    padding: 6px 14px;
    border-radius: 100px;
    color: var(--ink-faint);
    cursor: default;
  }

  .segmented button.active {
    background: var(--pill-active-bg);
    color: var(--ink);
    font-weight: 500;
  }

  .model-select {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13.5px;
    color: var(--ink-muted);
    padding: 6px 4px;
  }

  .model-select .divider {
    width: 1px;
    height: 12px;
    background: var(--ink-faint);
    opacity: 0.4;
    margin: 0 2px;
  }

  .model-select .chev { opacity: 0.6; }

  .mic-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-muted);
  }
  .mic-btn svg { width: 15px; height: 15px; }

  .footer-row {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    padding: 0 4px;
    font-size: 13px;
    color: var(--ink-muted);
  }

  .footer-item {
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: default;
  }
  .footer-item svg { width: 14px; height: 14px; opacity: 0.75; }
  .footer-item .chev { opacity: 0.55; margin-left: 1px; }

  .usage {
    color: var(--ink-faint);
  }
  .usage svg { width: 13px; height: 13px; opacity: 0.7; vertical-align: -2px; margin-right: 5px; }
</style>
</head>
<body>

  <div class="titlebar">
    <svg class="ghost" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 20V11a8 8 0 0 1 16 0v9l-2.5-1.8L15 20l-2.5-1.8L10 20l-2.5-1.8L5 20Z"/>
      <circle cx="9.5" cy="10.5" r="0.9" fill="currentColor" stroke="none"/>
      <circle cx="14.5" cy="10.5" r="0.9" fill="currentColor" stroke="none"/>
    </svg>
    <div class="win-btn">
      <svg viewBox="0 0 12 12"><rect x="1" y="5.5" width="10" height="1" fill="currentColor"/></svg>
    </div>
    <div class="win-btn">
      <svg viewBox="0 0 12 12"><rect x="1.5" y="1.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/></svg>
    </div>
    <div class="win-btn">
      <svg viewBox="0 0 12 12"><line x1="1" y1="1" x2="11" y2="11" stroke="currentColor" stroke-width="1.1"/><line x1="11" y1="1" x2="1" y2="11" stroke="currentColor" stroke-width="1.1"/></svg>
    </div>
  </div>

  <div class="stage">
    <div class="center">

      <div class="greeting">
        <svg class="spark" viewBox="0 0 24 24" fill="var(--accent)">
          <path d="M12 0c.6 3.6 1.4 6.2 2.6 7.9C15.9 9.5 18.4 10.6 22 11c-3.6.6-6.1 1.7-7.4 3.3C13.4 15.9 12.6 18.5 12 22c-.6-3.5-1.4-6.1-2.6-7.7C8.1 12.7 5.6 11.6 2 11c3.6-.4 6.1-1.5 7.4-3.1C10.6 6.2 11.4 3.6 12 0Z"/>
        </svg>
        <h1>Back at it, Hugo</h1>
      </div>

      <div class="card">
        <div class="placeholder">How can I help you today?</div>
        <div class="card-row">
          <div class="row-left">
            <div class="icon-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </div>
            <div class="segmented">
              <button>Chat</button>
              <button class="active">Cowork</button>
            </div>
          </div>
          <div class="row-right">
            <div class="model-select">
              <span>Opus 4.8</span>
              <span class="divider"></span>
              <span>High</span>
              <svg class="chev" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </div>
            <div class="mic-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="22"/>
              </svg>
            </div>
          </div>
        </div>
      </div>

      <div class="footer-row">
        <div class="footer-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="7" width="18" height="13" rx="1.5"/>
            <path d="M3 7l1.5-3h15L21 7"/>
          </svg>
          <span>Project or folder</span>
          <svg class="chev" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="footer-item usage">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>
          <span>2&times; more usage until August 5</span>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
